<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Kuwait FM Radio · راديو الكويت</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;800&family=Cairo:wght@700;900&display=swap');
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{width:100%;height:100%;overflow:hidden}
  body{font-family:'Space Grotesk',sans-serif;background:#0A0E1A;color:#F1F5F9;display:flex;align-items:center;justify-content:center}
  .container{display:flex;flex-direction:column;align-items:center;gap:16px;padding:20px;width:100%;max-width:340px}
  .icon-wrap{position:relative}
  .app-icon{width:96px;height:96px;background:linear-gradient(135deg,#38BDF8,#6366F1);border-radius:26px;display:flex;align-items:center;justify-content:center;font-size:46px;box-shadow:0 16px 48px rgba(56,189,248,0.35)}
  .live-dot{position:absolute;top:6px;right:6px;width:14px;height:14px;background:#22C55E;border-radius:50%;border:2px solid #0A0E1A;animation:pulse 1.5s infinite}
  @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.6;transform:scale(1.2)}}
  h1{font-size:2rem;font-weight:800;letter-spacing:-0.03em;text-align:center;background:linear-gradient(135deg,#F1F5F9,#38BDF8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
  .ar{font-family:'Cairo',sans-serif;font-size:1.1rem;font-weight:900;text-align:center;color:#64748B}
  .stations{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;width:100%}
  .chip{font-size:0.7rem;font-weight:700;color:#38BDF8;background:rgba(56,189,248,0.1);border:1px solid rgba(56,189,248,0.2);padding:4px 10px;border-radius:20px}
  .btn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;background:linear-gradient(135deg,#38BDF8,#6366F1);color:#fff;text-decoration:none;padding:18px 24px;border-radius:16px;font-weight:800;font-size:1rem;letter-spacing:0.01em;box-shadow:0 8px 32px rgba(56,189,248,0.3);transition:transform .15s,box-shadow .15s}
  .btn:active{transform:scale(0.97);box-shadow:0 4px 16px rgba(56,189,248,0.2)}
  .dl-icon{font-size:1.2rem}
  .meta{font-size:0.72rem;color:#334155;text-align:center;line-height:1.9}
  .meta a{color:#38BDF8;font-weight:700;text-decoration:none}
</style>
</head>
<body>
<div class="container">
  <div class="icon-wrap">
    <div class="app-icon">📻</div>
    <div class="live-dot"></div>
  </div>
  <h1>Kuwait FM Radio</h1>
  <p class="ar">راديو الكويت · الكويت</p>
  <div class="stations">
    <span class="chip">📡 8 Stations</span>
    <span class="chip">🔴 Live Stream</span>
    <span class="chip">🌙 Sleep Timer</span>
    <span class="chip">⭐ Favorites</span>
  </div>
  <a class="btn" href="/kuwaitradio.apk" download>
    <span class="dl-icon">⬇️</span>
    Download APK · تحميل
  </a>
  <div class="meta">
    Android 5.0+ · Free · No Ads<br>
    Programmed by <a href="https://x.com/KhaledQ84Ever" target="_blank">@KhaledQ84Ever</a>
  </div>
</div>
</body>
</html>

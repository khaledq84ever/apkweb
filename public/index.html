<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>راديو العرب · Arab Radio</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@700;900&display=swap');
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{width:100%;height:100%;overflow:hidden}
  body{font-family:'Cairo',sans-serif;background:#0D1117;color:#E6EDF3;display:flex;align-items:center;justify-content:center}
  .page{display:flex;flex-direction:column;align-items:center;justify-content:space-between;width:100%;max-width:320px;height:100%;padding:28px 20px 24px}
  .top{display:flex;flex-direction:column;align-items:center;gap:10px}
  .icon-wrap{position:relative}
  .app-icon{width:82px;height:82px;background:linear-gradient(135deg,#0B8A8A,#0FD3D3);border-radius:22px;display:flex;align-items:center;justify-content:center;font-size:40px;box-shadow:0 12px 32px rgba(11,138,138,0.4)}
  .live-dot{position:absolute;top:5px;right:5px;width:13px;height:13px;background:#3FB950;border-radius:50%;border:2px solid #0D1117;animation:p 1.4s infinite}
  @keyframes p{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.5;transform:scale(1.3)}}
  h1{font-size:1.75rem;font-weight:900;text-align:center;line-height:1.2}
  .sub{font-size:0.8rem;font-weight:700;color:#7D8590;text-align:center}
  .countries{font-size:0.75rem;color:#444D58;text-align:center;line-height:1.8}
  .bottom{display:flex;flex-direction:column;align-items:center;gap:12px;width:100%}
  .btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;background:linear-gradient(135deg,#0B8A8A,#0FD3D3);color:#fff;text-decoration:none;padding:16px;border-radius:14px;font-weight:900;font-size:1rem;box-shadow:0 8px 24px rgba(11,138,138,0.3);transition:transform .15s}
  .btn:active{transform:scale(0.97)}
  .meta{font-size:0.68rem;text-align:center;color:#444D58;line-height:1.8}
  .meta a{color:#0FD3D3;font-weight:700;text-decoration:none}
</style>
</head>
<body>
<div class="page">
  <div class="top">
    <div class="icon-wrap">
      <div class="app-icon">📻</div>
      <div class="live-dot"></div>
    </div>
    <h1>راديو العرب</h1>
    <p class="sub">Arab Radio · بث مباشر</p>
    <p class="countries">🇰🇼 🇸🇦 🇪🇬 🇱🇧 🇯🇴 🇶🇦 🇧🇭 🇴🇲<br>18 محطة عربية · 18 Arabic Stations</p>
  </div>
  <div class="bottom">
    <a class="btn" href="/kuwaitradio.apk" download>
      ⬇️ تحميل التطبيق · Download
    </a>
    <div class="meta">
      v2.0 · Android 5.0+ · مجاني<br>
      Programmed by <a href="https://x.com/KhaledQ84Ever" target="_blank">@KhaledQ84Ever</a>
    </div>
  </div>
</div>
</body>
</html>

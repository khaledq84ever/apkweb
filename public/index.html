<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>راديو العرب · Arab Radio</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;800&family=Cairo:wght@700;900&display=swap');
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{width:100%;height:100%;overflow:hidden}
  body{font-family:'Cairo','Space Grotesk',sans-serif;background:#0D1117;color:#E6EDF3;display:flex;align-items:center;justify-content:center}
  .container{display:flex;flex-direction:column;align-items:center;gap:14px;padding:20px;width:100%;max-width:340px}
  .icon-wrap{position:relative}
  .app-icon{width:90px;height:90px;background:linear-gradient(135deg,#0B8A8A,#0FD3D3);border-radius:26px;display:flex;align-items:center;justify-content:center;font-size:44px;box-shadow:0 16px 40px rgba(11,138,138,0.4)}
  .live-dot{position:absolute;top:6px;right:6px;width:14px;height:14px;background:#3FB950;border-radius:50%;border:2px solid #0D1117;animation:pulse 1.4s infinite}
  @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.5;transform:scale(1.25)}}
  h1{font-size:1.9rem;font-weight:900;text-align:center;color:#E6EDF3;line-height:1.2}
  .sub{font-size:0.85rem;font-weight:700;text-align:center;color:#7D8590}
  .chips{display:flex;flex-wrap:wrap;gap:7px;justify-content:center}
  .chip{font-size:0.68rem;font-weight:700;color:#0FD3D3;background:rgba(11,138,138,0.12);border:1px solid rgba(11,138,138,0.25);padding:4px 10px;border-radius:20px}
  .btn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;background:linear-gradient(135deg,#0B8A8A,#0FD3D3);color:#fff;text-decoration:none;padding:17px 24px;border-radius:15px;font-weight:900;font-size:1rem;box-shadow:0 8px 28px rgba(11,138,138,0.35);transition:transform .15s}
  .btn:active{transform:scale(0.97)}
  .meta{font-size:0.72rem;text-align:center;color:#444D58;line-height:1.9}
  .meta a{color:#0FD3D3;font-weight:700;text-decoration:none}
</style>
</head>
<body>
<div class="container">
  <div class="icon-wrap">
    <div class="app-icon">📻</div>
    <div class="live-dot"></div>
  </div>
  <h1>راديو العرب</h1>
  <p class="sub">Arab Radio · بث مباشر</p>
  <div class="chips">
    <span class="chip">🇰🇼 الكويت</span>
    <span class="chip">🇸🇦 السعودية</span>
    <span class="chip">🇪🇬 مصر</span>
    <span class="chip">🇱🇧 لبنان</span>
    <span class="chip">🇯🇴 الأردن</span>
    <span class="chip">🇶🇦 قطر</span>
    <span class="chip">🇧🇭 البحرين</span>
    <span class="chip">🇴🇲 عمان</span>
  </div>
  <a class="btn" href="/kuwaitradio.apk" download>
    ⬇️ &nbsp;تحميل التطبيق · Download
  </a>
  <div class="meta">
    v2.0 · 18 محطة · Android 5.0+ · مجاني<br>
    Programmed by <a href="https://x.com/KhaledQ84Ever" target="_blank">@KhaledQ84Ever</a>
  </div>
</div>
</body>
</html>

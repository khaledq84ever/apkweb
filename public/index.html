<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Download App</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', sans-serif;
    background: #0f172a;
    color: #e2e8f0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .card {
    background: #1e293b;
    border-radius: 20px;
    padding: 48px 40px;
    text-align: center;
    max-width: 360px;
    width: 90%;
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
  }
  .icon { font-size: 64px; margin-bottom: 20px; }
  h1 { font-size: 1.6rem; color: #f1f5f9; margin-bottom: 8px; }
  p { color: #94a3b8; font-size: 0.95rem; margin-bottom: 32px; }
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: #38bdf8;
    color: #0f172a;
    text-decoration: none;
    padding: 14px 32px;
    border-radius: 12px;
    font-weight: 700;
    font-size: 1rem;
    transition: background 0.2s, transform 0.1s;
  }
  .btn:hover { background: #7dd3fc; transform: scale(1.03); }
  .btn:active { transform: scale(0.98); }
  .version { margin-top: 20px; font-size: 0.8rem; color: #475569; }
</style>
</head>
<body>
<div class="card">
  <div class="icon">📱</div>
  <h1>My App</h1>
  <p>Click below to download and install the app on your Android phone.</p>
  <a class="btn" href="/myapp.apk" download>
    ⬇ Download APK
  </a>
  <div class="version">v1.0 · Android 5.0+</div>
</div>
</body>
</html>
